<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title }}{% else %}Voice of the Fathers{% endif
      %}
    </title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#127897;</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <script>
      if (
        localStorage.getItem("colorScheme") === "dark" ||
        (!("colorScheme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body
    class="bg-stone-50 text-stone-900 dark:bg-stone-950 dark:text-stone-100 min-h-screen flex flex-col"
  >
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-stone-900 focus:text-white dark:focus:bg-stone-100 dark:focus:text-stone-900 focus:rounded-md"
    >
      Skip to main content
    </a>

    <header class="bg-stone-100 dark:bg-stone-900 shadow-sm">
      <nav
        class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between"
      >
        <a
          href="/"
          class="text-xl font-bold text-stone-800 dark:text-stone-100 hover:text-stone-600 dark:hover:text-stone-300 flex items-center gap-2"
        >
          <span class="text-2xl">🎙</span>
          <span class="text-2xl">Voice of the Fathers</span>
        </a>
        <a
          href="/about.html"
          class="text-stone-600 dark:text-stone-400 hover:text-stone-800 dark:hover:text-stone-200 text-lg font-medium"
        >
          About
        </a>
      </nav>
    </header>

    <main id="main-content" class="flex-1 w-full max-w-4xl mx-auto px-4 py-8">
      {{ content }}
    </main>

    <footer
      class="bg-stone-100 dark:bg-stone-900 border-t border-stone-200 dark:border-stone-800 mt-auto"
    >
      <div
        class="max-w-4xl mx-auto px-4 py-6 text-center text-sm text-stone-500 dark:text-stone-400"
      >
        <p>Read the writings of the early church fathers</p>
      </div>
    </footer>
  </body>
</html>
