---
layout: default
---

<div class="flex flex-col md:flex-row gap-8 items-start mb-12">
  <img
    src="../../assets/images/{{ page.title }}.jpg"
    alt="Portrait of {{ page.title }}"
    class="w-32 h-32 md:w-40 md:h-40 rounded-2xl object-cover shadow-md flex-shrink-0"
  />
  <div>
    <h1 class="text-3xl font-bold text-stone-900 dark:text-stone-100 mb-4">
      {{ page.title }}
    </h1>
    <div class="prose prose-stone dark:prose-invert">{{ content }}</div>
  </div>
</div>

<h2 class="text-2xl font-bold text-stone-800 dark:text-stone-200 mb-6">
  Books
</h2>
<div class="grid gap-4">
  {% assign author_books = site.books | where: "author", page.title | sort:
  "order" %} {% for book in author_books %}
  <a
    href="{{ book.url | relative_url }}"
    class="block p-6 bg-stone-100 dark:bg-stone-900 rounded-lg hover:bg-stone-200 dark:hover:bg-stone-800 transition-colors shadow-sm"
  >
    <h3
      class="text-lg font-semibold text-stone-900 dark:text-stone-100 hover:text-stone-700 dark:hover:text-stone-300"
    >
      {{ book.title }}
    </h3>
  </a>
  {% endfor %}
</div>
